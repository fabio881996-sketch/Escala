<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A2B4A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Escalas GNR">
    <title>Portal de Escalas GNR</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Ícone -->
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div id="app">
        <!-- A app carrega aqui -->
        <div id="splash">
            <div class="splash-content">
                <div class="splash-icon">🛡️</div>
                <h1>Portal de Escalas</h1>
                <p>Guarda Nacional Republicana</p>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/gcal.js"></script>
    <script src="/static/js/pages/login.js"></script>
    <script src="/static/js/pages/minha_escala.js"></script>
    <script src="/static/js/pages/escala_geral.js"></script>
    <script src="/static/js/pages/ferias.js"></script>
    <script src="/static/js/pages/trocas.js"></script>
    <script src="/static/js/pages/definicoes.js"></script>
    <script src="/static/js/router.js"></script>
    <script src="/static/js/app.js"></script>

    <!-- Service Worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registado'))
                .catch(err => console.warn('SW erro:', err));
        }
    </script>
</body>
</html>
